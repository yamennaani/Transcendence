name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build backend
        run: docker compose build backend

  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build frontend
        run: docker compose build frontend
