name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  COMPOSE_FILE: src/docker-compose.yml
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Backend ────────────────────────────────────────────────────
  backend:
    name: Backend — build & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        working-directory: src/backend
        run: npm ci

      - name: Create secrets for Docker build
        run: |
          mkdir -p ~/.secrets/Transcendence
          echo "ci_test_password" > ~/.secrets/Transcendence/db_password
          chmod 600 ~/.secrets/Transcendence/db_password

      - name: Create .env
        run: |
          echo "POSTGRES_USER=ci_user"   > src/.env
          echo "POSTGRES_DB=ci_db"      >> src/.env
          echo "DB_HOST=database"       >> src/.env
          echo "DB_PORT=5432"           >> src/.env
          echo "PORT=3000"              >> src/.env

      - name: Build backend image
        run: docker compose -f $COMPOSE_FILE build backend

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run unit tests
        working-directory: src/frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build frontend image
        run: docker compose -f $COMPOSE_FILE build frontend

  # ── Integration ────────────────────────────────────────────────
  integration:
    name: Integration — stack smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets
        run: |
          mkdir -p ~/.secrets/Transcendence
          echo "ci_test_password" > ~/.secrets/Transcendence/db_password
          chmod 600 ~/.secrets/Transcendence/db_password

      - name: Create .env
        run: |
          echo "POSTGRES_USER=ci_user"   > src/.env
          echo "POSTGRES_DB=ci_db"      >> src/.env
          echo "DB_HOST=database"       >> src/.env
          echo "DB_PORT=5432"           >> src/.env
          echo "PORT=3000"              >> src/.env

      - name: Start stack
        run: docker compose -f $COMPOSE_FILE up -d --build

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for services..."
          sleep 15

      - name: Smoke test — nginx is up
        run: curl -f http://localhost || (docker compose -f $COMPOSE_FILE logs && exit 1)

      - name: Smoke test — API health
        run: curl -f http://localhost/api/health || (docker compose -f $COMPOSE_FILE logs backend && exit 1)

      - name: Smoke test — users endpoint
        run: curl -f http://localhost/api/users || (docker compose -f $COMPOSE_FILE logs backend && exit 1)

      - name: Print logs on failure
        if: failure()
        run: docker compose -f $COMPOSE_FILE logs

      - name: Tear down
        if: always()
        run: docker compose -f $COMPOSE_FILE down -v