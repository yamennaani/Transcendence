services:
  group_service:
    container_name: group_service
    build:
      context: ../..
      dockerfile: services/group/Dockerfile
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
    ports:
      - "3006:3000"
    depends_on:
      - database
    networks:
      - database-network
      - backend-network

networks:
  database-network:

  backend-network:
